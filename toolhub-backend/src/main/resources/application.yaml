server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:toolhub}
    username: ${POSTGRES_USER:toolhub}
    password: ${POSTGRES_PASSWORD:toolhub}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.toolhub: DEBUG

toolhub:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-replace-in-prod-min-32-chars-long}
    access-ttl-minutes: 15
    refresh-ttl-days: 30
